<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#5ccf9f">
<title>PA01 Offline</title>
<style>
  :root {
    --bg: #c1f0f1;
    --card: #ffffff;
    --text: #1d2a2c;
    --muted: #456063;
    --accent: #2b8f6b;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 20px;
    background: radial-gradient(circle at 20% 0%, #d7f8f8, var(--bg));
    color: var(--text);
    font-family: "Segoe UI", Tahoma, sans-serif;
  }

  main {
    width: min(560px, 100%);
    background: var(--card);
    border-radius: 14px;
    border: 1px solid #9acacc;
    padding: 22px;
    box-shadow: 0 12px 30px rgba(24, 70, 74, 0.14);
  }

  h1 {
    margin: 0 0 8px;
    font-size: 1.35rem;
  }

  p {
    margin: 8px 0;
    line-height: 1.5;
    color: var(--muted);
  }

  strong {
    color: var(--accent);
  }
</style>
</head>
<body>
<main>
  <h1>PA01 em modo offline</h1>
  <p>Sem conexao com a internet neste momento.</p>
  <p>O app continua acessivel, mas a conexao com o dispositivo depende do modo suportado no navegador.</p>
  <p><strong>Dica:</strong> em Chrome/Edge use o modo Web Bluetooth quando habilitado para o PA01.</p>
</main>
</body>
</html>
